<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FINE 6280 · Class Poll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1f3d;
    --paper:#f1f3f5;
    --accent:#e8a33d;
    --muted:rgba(241,243,245,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--ink);color:var(--paper);font-family:'Inter',system-ui,sans-serif;min-height:100vh;min-height:100dvh}
  body{display:flex;flex-direction:column;padding:max(env(safe-area-inset-top),24px) 22px max(env(safe-area-inset-bottom),32px)}
  .meta{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.55;margin-bottom:18px}
  .question{font-family:'Source Serif 4',Georgia,serif;font-weight:700;font-size:clamp(28px,7.2vw,42px);line-height:1.08;letter-spacing:-.01em;margin-bottom:10px}
  .prompt{font-size:15px;line-height:1.5;opacity:.78;margin-bottom:28px;max-width:32em}
  .options{display:flex;flex-direction:column;gap:12px;flex:1}
  .opt{
    appearance:none;-webkit-appearance:none;
    background:rgba(255,255,255,.04);
    color:var(--paper);
    border:1px solid rgba(255,255,255,.14);
    border-radius:14px;
    padding:18px 18px;
    text-align:left;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, border-color .15s ease;
    font-family:inherit;
    display:flex;flex-direction:column;gap:5px;
    min-height:64px;
  }
  .opt:hover, .opt:focus-visible{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.28);outline:none}
  .opt:active{transform:scale(.985)}
  .opt[data-chosen="true"]{
    background:rgba(232,163,61,.14);
    border-color:rgba(232,163,61,.62);
  }
  .opt-label{font-weight:600;font-size:18px;line-height:1.25}
  .opt-note{font-size:13px;opacity:.62;line-height:1.4}
  .footer{margin-top:28px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.4;text-align:center}
  .toast{
    margin-top:18px;padding:14px 16px;border-radius:10px;
    background:rgba(232,163,61,.12);
    border:1px solid rgba(232,163,61,.4);
    color:var(--paper);font-size:14px;line-height:1.5;
    display:none;
  }
  .toast.show{display:block}
  .err{background:rgba(255,90,90,.1);border-color:rgba(255,90,90,.45)}
  .reset{
    margin-top:16px;background:none;border:none;color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;text-decoration:underline;cursor:pointer;align-self:center;
  }
  .reset:hover{color:var(--paper)}
  @media (min-width:520px){
    body{max-width:560px;margin:0 auto}
  }
</style>
</head>
<body>
  <div class="meta" id="meta">FINE 6280 · Class Poll</div>
  <h1 class="question" id="question">Loading…</h1>
  <p class="prompt" id="prompt"></p>
  <div class="options" id="options"></div>
  <div class="toast" id="toast"></div>
  <button class="reset" id="reset" type="button" hidden>Reset my vote</button>
  <div class="footer">Schulich · York University</div>

<script src="../shared/polls.js"></script>
<script src="../shared/poll.js"></script>
<script>
(function () {
  const params = new URLSearchParams(location.search);
  const pollId = params.get('poll') || '';
  const poll = (window.POLLS || {})[pollId];

  const $q = document.getElementById('question');
  const $p = document.getElementById('prompt');
  const $opts = document.getElementById('options');
  const $toast = document.getElementById('toast');
  const $reset = document.getElementById('reset');
  const $meta = document.getElementById('meta');

  function showToast(msg, isErr) {
    $toast.textContent = msg;
    $toast.classList.toggle('err', !!isErr);
    $toast.classList.add('show');
  }

  if (!poll) {
    $q.textContent = 'Poll not found';
    $p.textContent = pollId
      ? 'No poll with id "' + pollId + '" is registered.'
      : 'Open this page from the projector’s QR code or with ?poll=…';
    return;
  }

  if (poll.chapter) {
    $meta.textContent = 'FINE 6280 · Chapter ' + String(poll.chapter).padStart(2, '0') + ' · Class Poll';
  }
  $q.textContent = poll.question;
  $p.textContent = poll.prompt || '';

  const alreadyVoted = window.PollClient.hasVoted(pollId);
  const previousChoice = alreadyVoted
    ? Number(localStorage.getItem('poll_voted_' + pollId))
    : -1;

  poll.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.type = 'button';
    btn.dataset.index = String(i);
    if (i === previousChoice) btn.dataset.chosen = 'true';
    btn.innerHTML =
      '<span class="opt-label"></span>' +
      (opt.note ? '<span class="opt-note"></span>' : '');
    btn.querySelector('.opt-label').textContent = opt.label;
    if (opt.note) btn.querySelector('.opt-note').textContent = opt.note;
    btn.addEventListener('click', () => onVote(i, btn));
    $opts.appendChild(btn);
  });

  if (alreadyVoted) {
    showToast('Vote recorded. Thanks!');
    $reset.hidden = false;
  }

  async function onVote(index, btn) {
    if (window.PollClient.hasVoted(pollId)) {
      showToast('You’ve already voted in this poll.');
      return;
    }
    document.querySelectorAll('.opt').forEach(b => b.disabled = true);
    btn.dataset.chosen = 'true';
    try {
      const ok = await window.PollClient.castVote(pollId, index);
      if (ok) {
        showToast('Vote recorded. Thanks!');
        $reset.hidden = false;
      } else {
        showToast('Vote was not recorded — already voted from this device.', true);
        document.querySelectorAll('.opt').forEach(b => b.disabled = false);
      }
    } catch (e) {
      showToast('Could not submit vote. Try again.', true);
      document.querySelectorAll('.opt').forEach(b => b.disabled = false);
      delete btn.dataset.chosen;
    }
  }

  $reset.addEventListener('click', () => {
    window.PollClient.clearVote(pollId);
    location.reload();
  });
})();
</script>
</body>
</html>
