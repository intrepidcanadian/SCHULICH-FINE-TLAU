<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ch1/01 Title · HyperFrames composition</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  /* === Bound from active DESIGN.md (ch1 deck — Indigo Porcelain) === */
  :root {
    --ink:#0a1f3d;
    --ink-rgb:10,31,61;
    --paper:#f1f3f5;
    --accent:#5b8def;
    --serif-en:"Playfair Display","Source Serif 4",Georgia,serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;color:var(--paper);font-family:var(--serif-en);overflow:hidden}

  /* === HyperFrames stage — 1920×1080, 5s total === */
  #stage{
    position:relative;
    width:1920px;
    height:1080px;
    background:radial-gradient(ellipse at center, #142949 0%, #0a1f3d 45%, #050d1d 100%);
    overflow:hidden;
  }
  /* Each scene is a child of #stage. Decoratives live at scene root,
     readable content lives in .scene-content. Scenes start invisible —
     the timeline's set() calls toggle them at their data-start boundaries. */
  .scene{position:absolute;inset:0;overflow:hidden;opacity:0}
  .scene-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 140px}

  /* === Decoratives === */
  .grain{
    position:absolute;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.08;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.6'/></svg>");
  }
  .horizon{
    position:absolute;left:0;right:0;top:50%;height:1px;
    background:linear-gradient(90deg, transparent 0%, rgba(91,141,239,.6) 35%, rgba(241,243,245,.85) 50%, rgba(91,141,239,.6) 65%, transparent 100%);
    transform-origin:left center;
  }
  .ray{
    position:absolute;top:-10%;bottom:-10%;width:280px;
    background:linear-gradient(90deg, transparent, rgba(241,243,245,.18), transparent);
    transform:skewX(-18deg);
    filter:blur(8px);
  }
  .particle{
    position:absolute;width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle, rgba(241,243,245,.95) 0%, rgba(91,141,239,.4) 60%, transparent 100%);
    filter:blur(.5px);
  }
  .tick{
    position:absolute;font-family:var(--mono);font-size:14px;letter-spacing:.3em;
    color:rgba(241,243,245,.4);text-transform:uppercase;
  }

  /* === Typography === */
  .kicker{font-family:var(--mono);font-size:18px;letter-spacing:.32em;text-transform:uppercase;color:rgba(241,243,245,.55);margin-bottom:30px}
  .title{font-family:var(--serif-en);font-weight:700;font-size:200px;line-height:.92;letter-spacing:-.025em;color:var(--paper)}
  .subtitle{font-family:var(--serif-en);font-weight:400;font-style:italic;font-size:42px;line-height:1.3;color:rgba(241,243,245,.78);max-width:1100px;margin-top:36px}
  .meta-row{display:flex;gap:28px;align-items:center;margin-top:48px;font-family:var(--mono);font-size:16px;letter-spacing:.22em;text-transform:uppercase;color:rgba(241,243,245,.45)}
  .meta-row .sep{opacity:.5}
</style>
</head>
<body>

<!--
  HyperFrames composition for ch1 slide 01 (Title — Fintech Defined).

  - 1920×1080 (16:9), 5 seconds total, three scenes on track 0.
  - Single paused GSAP timeline registered on window.__timelines so the
    HyperFrames engine can drive the playhead deterministically.
  - The slide deck embeds the rendered MP4 as a background video; this
    composition therefore shows ambient/transitional motion, not the full
    title text in its final position. Render with:
        cd hf/01-title && npx hyperframes render
-->
<div id="stage"
     data-composition-id="ch1-01-title"
     data-start="0"
     data-duration="5"
     data-width="1920"
     data-height="1080">

  <!-- Scene 1: 0.0 – 1.6s — horizon line draws across, particles emerge -->
  <div class="scene clip" data-start="0" data-duration="1.6" data-track-index="0" data-scene="1">
    <div class="grain"></div>
    <div class="horizon" id="horizon-1" style="transform:scaleX(0)"></div>
    <div class="particle" data-p="1" style="left:18%;top:42%"></div>
    <div class="particle" data-p="2" style="left:34%;top:58%"></div>
    <div class="particle" data-p="3" style="left:52%;top:38%"></div>
    <div class="particle" data-p="4" style="left:71%;top:62%"></div>
    <div class="particle" data-p="5" style="left:86%;top:46%"></div>
    <div class="ray" id="ray-1" style="left:-300px"></div>
    <div class="scene-content">
      <div class="kicker" id="kicker-1" style="opacity:0">FINE 6280 · Fintech Explained</div>
    </div>
  </div>

  <!-- Scene 2: 1.6 – 3.6s — title swells in (slide will overlay its own copy on top) -->
  <div class="scene clip" data-start="1.6" data-duration="2.0" data-track-index="0" data-scene="2">
    <div class="grain"></div>
    <div class="horizon" id="horizon-2" style="transform:scaleX(1);opacity:.4"></div>
    <div class="ray" id="ray-2" style="left:30%;opacity:0"></div>
    <div class="scene-content">
      <div class="kicker" style="opacity:.55">FINE 6280 · Fintech Explained</div>
      <div class="title" id="title-2" style="opacity:0;letter-spacing:.06em">Fintech Defined</div>
    </div>
  </div>

  <!-- Scene 3: 3.6 – 5.0s — settle to steady state (matches the slide overlay's resting frame) -->
  <div class="scene clip" data-start="3.6" data-duration="1.4" data-track-index="0" data-scene="3">
    <div class="grain"></div>
    <div class="horizon" style="transform:scaleX(1);opacity:.32"></div>
    <div class="tick" id="tick-3a" style="left:140px;top:78%;opacity:0">Lecture 01 of 14</div>
    <div class="tick" id="tick-3b" style="right:140px;top:78%;opacity:0">Schulich · York</div>
    <div class="scene-content">
      <div class="kicker" style="opacity:.55">FINE 6280 · Fintech Explained</div>
      <div class="title" style="letter-spacing:-.025em">Fintech Defined</div>
      <div class="subtitle" id="sub-3" style="opacity:0;transform:translateY(20px)">A graduate-level analytical framework for financial technology &mdash; definitional boundaries, periodisation, and the four-part lens.</div>
    </div>
  </div>
</div>

<script>
  // HyperFrames contract: a single paused timeline registered on window.__timelines
  // keyed by data-composition-id. The engine drives playhead via tl.seek() / tl.totalProgress().
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // Scene visibility — only one scene visible at a time. set() calls happen
  // instantly at the given timeline position when seeked or played.
  tl.set("[data-scene='1']", { opacity: 1 }, 0);
  tl.set("[data-scene='1']", { opacity: 0 }, 1.6);
  tl.set("[data-scene='2']", { opacity: 1 }, 1.6);
  tl.set("[data-scene='2']", { opacity: 0 }, 3.6);
  tl.set("[data-scene='3']", { opacity: 1 }, 3.6);

  // Scene 1 (0 – 1.6s)
  tl.to("#horizon-1", { scaleX: 1, duration: 1.0, ease: "power3.out" }, 0.15);
  tl.from("[data-p]", { opacity: 0, scale: 0, duration: 0.7, stagger: 0.08, ease: "back.out(2)" }, 0.45);
  // Finite yoyo so totalDuration stays bounded (HyperFrames seeks frame-by-frame)
  tl.to("[data-p]", { y: "-=14", duration: 1.0, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.1);
  tl.fromTo("#ray-1", { x: 0 }, { x: 2400, duration: 1.4, ease: "power2.inOut" }, 0.3);
  tl.to("#kicker-1", { opacity: .55, y: 0, duration: 0.6, ease: "power2.out" }, 1.0);

  // Scene 2 (1.6 – 3.6s) — title push-in, mid-scene letter-spacing settle
  tl.fromTo("#title-2",
    { opacity: 0, scale: 1.06, letterSpacing: ".06em" },
    { opacity: 1, scale: 1, letterSpacing: "-.025em", duration: 1.1, ease: "power3.out" },
    1.7);
  tl.to("#ray-2", { opacity: 1, x: 1300, duration: 1.6, ease: "power1.out" }, 1.9);
  tl.to("#horizon-2", { opacity: .55, duration: 0.8, ease: "sine.inOut" }, 2.4);

  // Scene 3 (3.6 – 5.0s) — subtitle reveals, ticks anchor, hold steady
  tl.to("#sub-3", { opacity: 1, y: 0, duration: 0.8, ease: "power2.out" }, 3.7);
  tl.to("#tick-3a", { opacity: 1, duration: 0.5 }, 4.0);
  tl.to("#tick-3b", { opacity: 1, duration: 0.5 }, 4.15);

  window.__timelines["ch1-01-title"] = tl;

  // Browser-preview convenience: auto-loop when opened directly in a browser.
  // The HyperFrames render harness sets window.__hfRender = true before init,
  // which suppresses this so the engine can drive the playhead frame-by-frame.
  if (!window.__hfRender) {
    tl.eventCallback('onComplete', () => { gsap.delayedCall(0.6, () => tl.seek(0).play()); });
    tl.play();
  }
</script>

</body>
</html>
